server:
  address: 0.0.0.0
  port: ${PORT:8001}
  servlet:
    context-path: /api

# 数据源配置
spring:
  application:
    name: second-market-backend
  
  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:${DB_DRIVER:org.postgresql.Driver}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:second_market}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:second_market}}
    url: ${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://127.0.0.1:5432/second_market}}
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
      pool-name: SecondMarketHikariCP
    
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.echoofmemories.project.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.echoofmemories.project: debug
    org.springframework.web: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'
    
# Knife4j Swagger 配置
knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
    
# 自定义配置
project:
  jwt:
    secret: ${JWT_SECRET:}
    expire-time: 86400000  # 24小时
  file:
    upload-path: ${PROJECT_FILE_UPLOAD_PATH:${user.dir}/uploads/}
    max-size: 10MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,txt
  server:
    base-url: ${SERVER_BASE_URL:http://localhost:8001/api}

# AI功能配置
ai:
  enabled: ${AI_ENABLED:true}
  api:
    base-url: ${AI_BASE_URL:https://api.siliconflow.cn/v1/chat/completions}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:Qwen/Qwen2-VL-72B-Instruct}
    max-tokens: ${AI_MAX_TOKENS:4096}
    temperature: ${AI_TEMPERATURE:0.7}
    timeout: ${AI_TIMEOUT:6000000}
  # 功能配置
  features:
    rate-limit: ${AI_RATE_LIMIT:3}                                # 每分钟请求限制
    content-filter: ${AI_CONTENT_FILTER:true}                            # 内容过滤开关
